<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Website for Ceramic soul brand" />
    <meta name="author" content="Awesome student" />
    <title>Ceramic soul</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="promo">
    <div class="container promo__container">
      <header class="header">
        <div class="burger"><span></span><span></span><span></span></div>
        <a href="index.html" class="header__logo">
          <img src="/src/logo/logo.png" alt="logo" />
        </a>
        <div class="header__icons">
          <a href="#"><span class="icon-search"></span></a>
          <a href="#"><span class="icon-shopping-bag"></span></a>
        </div>
      </header>
        <nav class="promo__menu">
          <a class="promo__link" href="catalog.html">catalog</a>
          <a class="promo__link" href="blog.html">blog</a>
          <a class="promo__link" href="about.html">about</a>
        </nav>
    </div>
  </section>
<section class="blog">
  <h1 class="title-h1 blog__title">
    our digital notes
  </h1>
  <div class="blog_feed-container"></div>
</section>

</main>
<section class="foot">
      <footer class="footer">
        <div class="foot footer__newsletter">
          <h2 class="foot-header footer__headers">
            newsletter
          </h2>
          <p class="foot-text footer__newsletter__text">Keep up to date with news and promotions</p>
          <label class="footer__newsletter__label">
            <input type="text" class="footer-input footer__newsletter__input" placeholder="Enter your e-mail">
          </label>
          <label class="checkbox footer__checkbox">
            <input type="checkbox" class="footer-checkbox footer__newsletter__checkbox">
            <p class="forms-text footer__newsletter__text">I agree with the <a href="#" class="about-terms footer__newsletter__terms">
              terms</a></p>
          </label>
          <button class="btn-submit">submit</button>
        </div>
        <div class="f-l-fus footer__link-us">
        <div class="f-links footer__inf">
          <div class="discover footer__discover">
            <p class="footer-headers footer__headers">discover</p>
            <div class="f-l footer__links">
              <a class="f-link footer__link" href="#">About Us</a>
              <a class="f-link footer__link" href="#">Blog</a>
            </div>
          </div>
          <div class="shopping footer__shopping">
            <p class="footer-headers footer__headers">shopping</p>
            <div class="f-l footer__links">
              <a class="f-link footer__link" href="#">Catalog</a>
            </div>
          </div>
          <div class="information footer__information">
            <p class="footer-headers footer__headers">information</p>
            <div class="f-l footer__links">
              <a class="f-link footer__link" href="#">Terms and Conditions</a>
            </div>
          </div>
        </div>
        <div class="f-us footer__follow-us">
          <p class="footer-headers footer__headers">follow us</p>
          <div class="f-img-links footer__follow-us__links">
            <a href="#"><img class="footer-icons footer__follow-us__icons" src="src/icons/facebook.png"></a>
            <a href="#"><img class="footer-icons footer__follow-us__icons" src="src/icons/instagram.png"></a>
            <a href="#"><img class="footer-icons footer__follow-us__icons" src="src/icons/pinterest.png"></a>
          </div>
        </div>
        </div>
      </footer>
      <p class="footer-copyright footer__copyright">© Copyright 2025, Ceramic soul</p>
    </section>


    <script type="module" src="/src/js/script.js"></script>
    <script type="module" src="/src/js/blog.js"></script>
  </body>
</html>
